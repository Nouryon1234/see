name: Sync Foundry Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard_data.json from Foundry
        run: |
          curl -s -o dashboard_data.json \
            -H "Authorization: Bearer ${{ secrets.FOUNDRY_TOKEN }}" \
            "https://nouryon.palantirfoundry.com/api/v2/datasets/ri.foundry.main.dataset.03a1f6ac-bb61-4e07-b8dd-44915e38e962/files/dashboard_data.json/content?branch=master"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard_data.json
          git diff --staged --quiet || git commit -m "Auto-update dashboard data from Foundry"
          git push
